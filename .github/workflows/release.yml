name: Weekly Arabic RTL Release

on:
  schedule:
    - cron: '0 21 * * 4'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build all variants
        run: npm run build

      - name: Create ZIP archives
        run: |
          cd dist
          zip -r Data-RTL.zip          Data-RTL/
          zip -r Data-RTL-WORD-WRAP.zip Data-RTL-WORD-WRAP/
          ls -lh *.zip

      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Delete existing release (if any)
        run: |
          gh release delete latest-release --yes || true
          git push origin :refs/tags/latest-release || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create updated release
        run: |
          gh release create latest-release \
            --title "Arabic Translation — Updated ${{ steps.date.outputs.DATE }}" \
            --notes "## تعريب ريمورلد — آخر تحديث: ${{ steps.date.outputs.DATE }}

          ## 🛠️ نسخ التعريب المتاحة

          | النسخة | الحروف | الاتجاه |
          | :--- | :---: | :---: |
          | **Data-RTL** | ✅ متصلة | ⬆️ معكوس |
          | **Data-RTL-WORD-WRAP** | ✅ متصلة | ✅ صحيح **(موصى به)** |

          ---

          ## 🚀 طريقة التثبيت

          1. حمّل النسخة المناسبة
          2. افتح ملف الـ ZIP
          3. انسخ مجلد \`Data\` وألصقه داخل مجلد اللعبة الرئيسي (دمج ملفات Data)
            " \
            dist/Data-RTL.zip \
            dist/Data-RTL-WORD-WRAP.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
